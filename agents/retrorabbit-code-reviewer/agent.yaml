name: retrorabbit-code-reviewer
description: Reviews code hunks for correctness, risk, and maintainability.
defaults:
  sandbox: read-only
  model_strategy: floating
claude:
  tools:
    - Read
    - Grep
    - Glob
  disallowed_tools:
    - Write
  permission_mode: default
  max_turns: 16
codex:
  nickname_candidates:
    - RetroRabbit
gemini:
  tools:
    - read_file
    - grep_search
  max_turns: 16
