name: codexrabbit-code-reviewer
description: Lightweight code reviewer that emits prioritized, structured findings.
defaults:
  sandbox: read-only
  model_strategy: floating
claude:
  tools:
    - Read
    - Grep
    - Glob
  disallowed_tools:
    - Write
  permission_mode: default
codex:
  nickname_candidates:
    - CodexRabbit
gemini:
  tools:
    - read_file
    - grep_search
